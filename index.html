<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="Verz_Icon_SVG.svg">
    <title>Verz - Be part of the story</title>
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px 8vw 40px;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Header - estilo Apple: más arriba, logo e icono más pequeños */
        header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: auto;
            padding-top: 4px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-container img:first-child {
            width: 18px;
            height: 18px;
        }

        .logo-container img:last-child {
            height: 18px;
            width: auto;
        }

        /* Main Content Grid */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 100px;
            align-items: center;
            max-width: 1200px;
            margin: auto;
            width: 100%;
            padding: 40px 0;
        }

        /* Left Column */
        .left-content p {
            font-size: 22px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 6px;
            color: #333333;
            letter-spacing: -0.3px;
        }

        .left-content h2 {
            font-size: 36px;
            font-weight: 700;
            margin-top: 14px;
            letter-spacing: -1px;
            cursor: pointer;
            display: inline-block;
            transition: opacity 0.2s ease;
        }

        .left-content h2:hover {
            opacity: 0.7;
        }

        /* Right Column */
        .right-content {
            max-width: 380px;
        }

        .right-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .right-content p {
            font-size: 16px;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        /* Form Elements */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #E5E5EA; 
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            color: #1a1a1a;
            background-color: #ffffff;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none;
        }

        input[type="email"]::placeholder {
            color: #999999;
        }

        input[type="email"]:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.2s ease;
        }

        button:hover {
            background-color: #333333;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-top: auto;
            padding-top: 40px;
        }

        footer a, footer span {
            font-size: 13px;
            color: #8e8e93;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: #1a1a1a;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                gap: 60px;
            }
            .right-content {
                max-width: 100%;
            }
            body {
                padding: 30px 5vw;
            }
        }
    </style>
</head>
<body>

    <header class="animate">
        <div class="logo-container">
            <img src="Verz_Icon_SVG.svg" alt="Verz Icon">
            <img src="Verz_Logo_SVG.svg" alt="Verz Logo">
        </div>
    </header>

    <main>
        <div class="left-content">
            <p class="animate delay-1">Monitor worldwide news as fast as you can imagine</p>
            <p class="animate delay-2">Follow the story from the very first rumors</p>
            <p class="animate delay-3">Track the updates and news status</p>
            <h2 class="animate delay-4">And there's more. Check it out</h2>
        </div>
        
        <div class="right-content animate delay-3">
            <h1>Be part of the story.</h1>
            <p>Create account</p>
            
            <form class="form-group" id="signup-form">
                <input type="email" id="signup-email" placeholder="Email" required aria-label="Email address">
                <button type="submit" id="signup-button">Go</button>
            </form>
            <p id="signup-message" style="font-size: 13px; color: #8e8e93; margin-top: 8px; min-height: 18px;"></p>
        </div>
    </main>

    <footer class="animate delay-4">
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">EULA</a>
        <span>Lat Ware Co.</span>
    </footer>
    
    <!-- Supabase Auth -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = "https://kwyjinqkdlkicoewkego.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3eWppbnFrZGxraWNvZXdrZWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNDAwMDIsImV4cCI6MjA4MzkxNjAwMn0.wpZoU2w-mmFB99N23epW4-mOKUmOmRsTv_x_S0ZKaqI";

        // Con el build UMD, Supabase expone una variable global `supabase`
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById("signup-form");
        const emailInput = document.getElementById("signup-email");
        const button = document.getElementById("signup-button");
        const messageEl = document.getElementById("signup-message");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = emailInput.value.trim();
            if (!email) return;

            button.disabled = true;
            button.textContent = "Sending...";
            messageEl.style.color = "#8e8e93";
            messageEl.textContent = "Sending magic link...";

            const { error } = await client.auth.signUp({ email });

            if (error) {
                messageEl.style.color = "#d0021b";
                messageEl.textContent = error.message || "Something went wrong. Please try again.";
            } else {
                messageEl.style.color = "#007aff";
                messageEl.textContent = "Check your email to complete sign up.";
                emailInput.value = "";
            }

            button.disabled = false;
            button.textContent = "Go";
        });
    </script>
</body>
</html>
